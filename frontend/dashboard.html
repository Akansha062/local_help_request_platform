<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UrbanTasker</title>

<style>

body{
    margin:0;
    font-family: Arial;
    background:#f5f7fa;
}

/* HEADER */
.header{
    padding:20px;
    font-size:24px;
    font-weight:bold;
    color:#004d40;
    background:white;
}

/* HERO */
.hero{
    background:#004d40;
    color:white;
    text-align:center;
    padding:60px 20px;
}

.hero h1{
    margin:5px;
    font-size:36px;
}

.second{
    color:#ffcc00;
}

/* SEARCH */
.search-box{
    margin-top:20px;
}

.search-box input{
    padding:10px;
    width:250px;
    border:none;
    border-radius:20px;
}

.search-box button{
    padding:10px 20px;
    border:none;
    background:#ffcc00;
    border-radius:20px;
    cursor:pointer;
}

/* MAIN */
.container{
    display:flex;
    padding:20px;
    gap:20px;
}

/* SIDEBAR */
.sidebar{
    width:200px;
}

.sidebar button{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    background:white;
    border-radius:8px;
    cursor:pointer;
}

/* RIGHT */
.right{
    flex:1;
}

/* CARDS */
.cards{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
}

.card{
    width:200px;
    background:white;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}

.card img{
    width:100%;
    height:120px;
    object-fit:cover;
}

.card h3{
    margin:10px;
}

.card:hover{
    transform:scale(1.05);
}

/* SUPPORT SECTION */
.support{
    margin-top:30px;
    background:white;
    padding:20px;
    border-radius:10px;
}

.support h3{
    margin-top:0;
}

.support p{
    margin:8px 0;
}

/* MOBILE */
@media(max-width:768px){
    .container{
        flex-direction:column;
    }
    .sidebar{
        width:100%;
    }
}

</style>
</head>

<body>

<div class="header">UrbanTasker</div>

<div class="hero">
    <h1>Book Trusted Help</h1>
    <h1 class="second">For Your Daily Needs</h1>

    <div class="search-box">
        <input type="text" placeholder="Search service">
        <button>Search</button>
    </div>
</div>

<div class="container">

    <!-- LEFT -->
    <div class="sidebar">
        <button>Home</button>
        <button>My Requests</button>
        <button>Create Request</button>
        <button>Logout</button>
    </div>

    <!-- RIGHT -->
    <div class="right">

        <h2>Popular Services</h2>

        <div class="cards">

            <div class="card"><img src="https://images.unsplash.com/photo-1621905251189-08b45d6a269e"><h3>Electrician</h3></div>

            <div class="card"><img src="https://images.unsplash.com/photo-1581244276894-0f79998188bc"><h3>Plumber</h3></div>

            <div class="card"><img src="https://images.unsplash.com/photo-1581574208077-5c9cfd6b8d4d"><h3>Home Cleaning</h3></div>

            <div class="card"><img src="https://images.unsplash.com/photo-1533090161767-e6ffed986c88"><h3>Carpenter</h3></div>

            <div class="card"><img src="https://images.unsplash.com/photo-1597007066704-67bf2068d5b2"><h3>Painter</h3></div>

            <div class="card"><img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c"><h3>Wall Repair</h3></div>

            <div class="card"><img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952"><h3>Pest Control</h3></div>

            <div class="card"><img src="https://images.unsplash.com/photo-1581091215367-59ab6b5c8a8b"><h3>Appliance Repair</h3></div>

        </div>

        <!-- 🔥 SUPPORT SECTION -->
        <div class="support">
            <h3>Need Help?</h3>
            <p>📞 Call us: 9876543210</p>
            <p>📧 Email: support@urbantasker.com</p>
            <p>⏰ Available: 9 AM – 9 PM</p>
        </div>

    </div>
</div>

<script>

// CLICK → NEXT PAGE
document.querySelectorAll(".card").forEach(card=>{
    card.addEventListener("click", function(){
        let service = this.innerText.toLowerCase().replace(/\s+/g,"");
        window.location.href = "services.html?service=" + service;
    });
});

</script>

</body>
</html>
