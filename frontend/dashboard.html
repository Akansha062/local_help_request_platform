<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanTasker</title>
    <link rel="stylesheet" href="dashboard.css">
</head>

<body>
<div class="logo">UrbanTasker</div>
<!-- HERO -->
<div class="hero">
    <h1>Book Trusted Help</h1>
    <h1 class="second">For Your Daily Needs</h1>

    <div class="search-box">
        <input type="text" placeholder="What do you need help with?">
        <button>Search</button>
    </div>
</div>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <a href="#"><button>Home</button></a>
        <a href="#"><button>My Requests</button></a>
        <a href="create.html"><button>Create Request</button></a>
        <a href="#"><button>Logout</button></a>
    </div>

    <!-- RIGHT -->
    <div class="right">

        <!-- SERVICES BOX -->
        <div class="box">
            <h2>Popular Services</h2>

            <div class="services">
                <div class="service">Electrician</div>
                <div class="service">Plumber</div>
                <div class="service">Painter</div>
                <div class="service">Wall Repair</div>
                <div class="service">Home Cleaning</div>
                <div class="service">Pest Control</div>
                <div class="service">Appliance Repair</div>
                <div class="service">Carpenter</div>
            </div>
        </div>

        <!-- REQUEST BOX -->
        <div class="box">
            <h3>Recent Requests</h3>

            <ul class="requests">
                <li>Electrician - Pending</li>
                <li>Plumber - Completed</li>
                <li>Painter - In Progress</li>
            </ul>
        </div>

    </div>
</div>

<script src="script.js"></script>

</body>
</html>
