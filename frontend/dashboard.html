<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UrbanTasker</title>

<style>

body{
    margin:0;
    font-family: Arial;
    background:#f5f7fa;
}

/* LOGO */
.logo{
  font-family: Georgia, "Times New Roman", serif;
  position:absolute;
  top:20px;
  left:30px;
  font-size:28px;
  font-weight:bold;
  color:#f4c430;
  text-shadow: 1px 1px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000;
}

/* HERO */
.hero{
    background:#004d40;
    color:white;
    text-align:center;
    padding:60px 20px;
}

.hero h1{
    margin:5px;
    font-size:36px;
}

.second{
    color:#ffcc00;
}

/* SEARCH */
.search-box{
    margin-top:20px;
}

.search-box input{
    padding:10px;
    width:250px;
    border:none;
    border-radius:20px;
}

.search-box button{
    padding:10px 20px;
    border:none;
    background:#ffcc00;
    border-radius:20px;
    cursor:pointer;
}

/* MAIN */
.container{
    display:flex;
    padding:20px;
    gap:20px;
}

/* SIDEBAR */
.sidebar{
    width:200px;
}

.sidebar button{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    background:white;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

/* 🔥 HOVER FIX */
.sidebar button:hover{
    background:#004d40;
    color:white;
    transform:translateX(5px);
}

/* RIGHT */
.right{
    flex:1;
}

/* CARDS */
.cards{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
}

.card{
    width:200px;
    background:white;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}

.card img{
    width:100%;
    height:120px;
    object-fit:cover;
}

.card h3{
    margin:10px;
}

.card:hover{
    transform:scale(1.05);
}

/* SUPPORT */
.support{
    margin-top:30px;
    background:white;
    padding:20px;
    border-radius:10px;
}

/* FOOTER */
.footer{
    margin-top:30px;
    background:#004d40;
    color:white;
    text-align:center;
    padding:20px;
}

/* MOBILE */
@media(max-width:768px){
    .container{
        flex-direction:column;
    }
    .sidebar{
        width:100%;
    }
}

</style>
</head>

<body>

<div class="logo">UrbanTasker</div>

<div class="hero">
    <h1>Book Trusted Help</h1>
    <h1 class="second">For Your Daily Needs</h1>

    <div class="search-box">
        <input type="text" id="search" placeholder="Search service">
        <button>Search</button>
    </div>
</div>

<div class="container">

    <!-- LEFT -->
    <div class="sidebar">
        <button>Home</button>
        <button>My Requests</button>
        <button>Create Request</button>
        <button>Logout</button>
    </div>

    <!-- RIGHT -->
    <div class="right">

        <h2>Popular Services</h2>

        <div class="cards">

            <div class="card"><img src="electrician.jpg"><h3>Electrician</h3></div>
            <div class="card"><img src="plumber.avif"><h3>Plumber</h3></div>
            <div class="card"><img src="cleaning.webp"><h3>Home Cleaning</h3></div>
            <div class="card"><img src="cleaning.webp"><h3>Carpenter</h3></div>
            <div class="card"><img src="painter.avif"><h3>Painter</h3></div>
            <div class="card"><img src="wall repair.avif"><h3>Wall Repair</h3></div>
            <div class="card"><img src="pest control.avif"><h3>Pest Control</h3></div>
            <div class="card"><img src="applicance repair.avif"><h3>Appliance Repair</h3></div>

        </div>

        <div class="support">
            <h3>Need Help?</h3>
            <p>📞 9876543210</p>
            <p>📧 support@urbantasker.com</p>
        </div>

    </div>
</div>

<div class="footer">
    <p>© 2026 UrbanTasker | All Rights Reserved</p>
</div>

<script>

// CLICK → NEXT PAGE
document.querySelectorAll(".card").forEach(card=>{
    card.addEventListener("click", function(){
        let service = this.innerText.toLowerCase().replace(/\s+/g,"");
        window.location.href = "services.html?service=" + service;
    });
});

// SEARCH
let search = document.getElementById("search");

search.addEventListener("keyup", function(){
    let value = search.value.toLowerCase();

    document.querySelectorAll(".card").forEach(card=>{
        let text = card.innerText.toLowerCase();
        card.style.display = text.includes(value) ? "block" : "none";
    });
});

</script>

</body>
</html>
