<!DOCTYPE html>
<html>
<head>
<title>UrbanTasker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background:#1d2c33;
}

.logo{
  position:absolute;
  top:20px;
  left:30px;
  font-size:26px;
  font-weight:bold;
  color:#f4c430;
  font-family: Georgia, serif;
}

.container{
  padding-top:100px;
  width:90%;
  max-width:1000px;
  margin:auto;
}

h1{
  text-align:center;
  color:white;
  margin-bottom:30px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}
  
.card{
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.03);
}

.left{
  max-width:70%;
}

.name{
  font-size:18px;
  font-weight:bold;
}

.rating{
  color:#f4c430;
  margin-top:5px;
}

.price{
  font-size:14px;
  color:gray;
  margin-top:5px;
}

.expertise{
  font-size:13px;
  color:#555;
  margin-top:5px;
}

.right{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:10px;
}

.badge{
  font-size:12px;
  background:#e8f5e9;
  color:#2e7d32;
  padding:3px 8px;
  border-radius:5px;
}

button{
  padding:8px 12px;
  background:#f4c430;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

button:hover{
  background:#d4aa00;
}

.no-data{
  color:white;
  text-align:center;
}

@media(max-width:768px){
  .grid{
    grid-template-columns:1fr;
  }
  .card{
    flex-direction:column;
    align-items:flex-start;
    gap:10px;
  }
  .right{
    width:100%;
    align-items:flex-start;
  }
  .logo{
    font-size:20px;
    left:15px;
  }
}
</style>
</head>

<body>
<div class="logo">UrbanTasker</div>
<div class="container">
  <h1 id="title">Service Providers</h1>
  <div id="list" class="grid"></div>
</div>

<script>
var url = window.location.search;
var service = url.split("=")[1];

//sample data since backend isnt connected yet
var plumbers = [
  {
    name:"AquaFix Services Pvt Ltd",
    rating:"⭐ 4.6",
    price:"₹350/hr",
    expertise:"Full plumbing solutions"
  },
  {
    name:"Ramesh Kumar",
    rating:"⭐ 4.5",
    price:"₹300/hr",
    expertise:"Leak repair, pipe fitting"
  },
  {
    name:"Suresh Yadav",
    rating:"⭐ 4.2",
    price:"₹250/hr",
    expertise:"Bathroom fittings"
  },
  {
    name:"Imran Ali",
    rating:"⭐ 4.3",
    price:"₹280/hr",
    expertise:"Tap & pipe repair"
  }
];

var electricians = [
  {
    name:"PowerFix Electricals Ltd",
    rating:"⭐ 4.7",
    price:"₹450/hr",
    expertise:"Complete electrical work"
  },
  {
    name:"Amit Sharma",
    rating:"⭐ 4.6",
    price:"₹400/hr",
    expertise:"Wiring, switch repair"
  },
  {
    name:"Rahul Verma",
    rating:"⭐ 4.3",
    price:"₹300/hr",
    expertise:"Fan & light install"
  },
  {
    name:"Faizan Khan",
    rating:"⭐ 4.2",
    price:"₹280/hr",
    expertise:"Maintenance work"
  }
];

var selectedList = [];
if(service == "plumber"){
  selectedList = plumbers;
  document.getElementById("title").innerText = "Plumber Services";
}
else if(service == "electrician"){
  selectedList = electricians;
  document.getElementById("title").innerText = "Electrician Services";
}

var listDiv = document.getElementById("list");
if(selectedList.length == 0){
  listDiv.innerHTML = "<p class='no-data'>No providers found</p>";
}
else{
  for(var i=0; i<selectedList.length; i++)
  {
    var p = selectedList[i];
    listDiv.innerHTML += `
      <div class="card">
        
        <div class="left">
          <div class="name">${p.name}</div>
          <div class="rating">${p.rating}</div>
          <div class="price">${p.price}</div>
          <div class="expertise">${p.expertise}</div>
        </div>

        <div class="right">
          <div class="badge">Verified</div>
          <button onclick="viewDetails('${p.name}')">
            View Details
          </button>
        </div>

      </div>
    `;
  }
}

function viewDetails(name){
  window.location.href =
    "provider.html?name=" + name + "&service=" + service;
}
</script>
</body>
</html>
