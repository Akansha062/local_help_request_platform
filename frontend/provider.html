<!DOCTYPE html>
<html>
<head>
<title>Provider Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f2027, #203a43);
    color:white;
}

.header{
    padding:20px;
    font-size:24px;
    font-weight:bold;
    color:#ffcc00;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.card{
    background:white;
    color:black;
    width:400px;
    border-radius:12px;
    padding:25px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.name{
    font-size:22px;
    font-weight:bold;
}

.rating{
    color:orange;
    margin:5px 0;
}

.details p{
    margin:8px 0;
}

.btn{
    width:100%;
    padding:12px;
    background:#ffcc00;
    border:none;
    border-radius:8px;
    font-weight:bold;
    margin-top:20px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="header">UrbanTasker</div>

<div class="container">
    <div class="card">

        <div class="name" id="name"></div>
        <div class="rating" id="rating"></div>

        <div class="details">
            <p><b>Service:</b> Electrician</p>
            <p><b>Price:</b> <span id="price"></span></p>
            <p><b>Description:</b> <span id="desc"></span></p>
            <p><b>Experience:</b> 5 Years</p>
            <p><b>Phone:</b> 9876543210</p>
        </div>

        <button class="btn" onclick="bookNow()">Book Now</button>

    </div>
</div>

<script>

let params = new URLSearchParams(window.location.search);

document.getElementById("name").innerText = params.get("name");
document.getElementById("rating").innerText = "⭐ " + params.get("rating");
document.getElementById("price").innerText = "₹" + params.get("price") + "/hr";
document.getElementById("desc").innerText = params.get("desc");

function bookNow(){
    alert("Booking Confirmed ✅");
}

</script>

</body>
</html>
