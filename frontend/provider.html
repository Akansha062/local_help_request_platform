<!DOCTYPE html>
<html>
<head>
<title>Local Help Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg, #16b5e0, #6dd5ed);
  min-height:100vh;
  padding:20px;
}

/* HEADING */
h1{
  text-align:center;
  color:white;
}

/* HOME */
.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

/* CARD */
.card{
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  padding:15px;
  border-radius:15px;
  width:230px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  cursor:pointer;
  transition:0.3s;
  color:white;
}

.card:hover{
  transform:translateY(-5px);
}

/* IMAGE */
img{
  width:80px;
  border-radius:50%;
}

/* TEXT SPACING */
.card p{
  margin:5px 0;
  font-size:14px;
}

/* DETAILS */
.details{
  max-width:400px;
  margin:auto;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  padding:25px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  color:white;
}

.profile-img{
  width:100px;
  border-radius:50%;
  margin-bottom:10px;
}

/* INFO BOX */
.info{
  background: rgba(255,255,255,0.3);
  padding:10px;
  border-radius:8px;
  margin:8px 0;
}

/* BUTTON */
button{
  margin-top:10px;
  padding:10px;
  background:#2193b0;
  border:none;
  border-radius:5px;
  cursor:pointer;
  width:100%;
  font-size:15px;
}

button:hover{
  background:#1b7f94;
}

/* HIDE */
.hidden{
  display:none;
}
</style>
</head>

<body>

<h1>Local Help Platform</h1>

<!-- HOME -->
<div id="home">
  <div class="container" id="list"></div>
</div>

<!-- DETAILS -->
<div id="details" class="hidden"></div>

<script>

// ✅ DATA
var providers = [
  {
    id:1,
    name:"Ravi Kumar",
    rating:4.5,
    price:300,
    phone:"9876543210",
    exp:"5 years",
    img:"https://i.pravatar.cc/100?img=1"
  },
  {
    id:2,
    name:"Aman Singh",
    rating:4.2,
    price:250,
    phone:"9123456780",
    exp:"3 years",
    img:"https://i.pravatar.cc/100?img=2"
  },
  {
    id:3,
    name:"Suresh",
    rating:4.6,
    price:350,
    phone:"9999999999",
    exp:"6 years",
    img:"https://i.pravatar.cc/100?img=3"
  }
];

// 🔹 SHOW HOME
function showHome(){
  document.getElementById("home").classList.remove("hidden");
  document.getElementById("details").classList.add("hidden");
}

// 🔹 SHOW DETAILS
function showDetails(id){

  var person = providers.find(function(p){
    return p.id == id;
  });

  var box = document.getElementById("details");

  if(person){
    box.innerHTML =
      "<div class='details'>" +

      "<img src='"+person.img+"' class='profile-img'>" +
      "<h2>"+person.name+"</h2>" +

      "<div class='info'>⭐ Rating: "+person.rating+"</div>" +
      "<div class='info'>💰 Price: ₹"+person.price+" per hour</div>" +
      "<div class='info'>📞 Phone: "+person.phone+"</div>" +
      "<div class='info'>🧰 Experience: "+person.exp+"</div>" +

      "<button onclick='book()'>Book Now</button>" +
      "<button onclick='showHome()'>⬅ Back</button>" +

      "</div>";
  }
  else{
    box.innerHTML = "<h2>❌ No Data Found</h2>";
  }

  document.getElementById("home").classList.add("hidden");
  document.getElementById("details").classList.remove("hidden");
}

// 🔹 BOOK
function book(){
  alert("✅ Booking Confirmed!");
}

// 🔹 LOAD HOME LIST (FULL DETAILS SHOW)
var list = document.getElementById("list");

providers.forEach(function(p){
  list.innerHTML +=
    "<div class='card' onclick='showDetails("+p.id+")'>" +

    "<img src='"+p.img+"'>" +
    "<h3>"+p.name+"</h3>" +

    "<p> Rating: "+p.rating+"</p>" +
    "<p>Price: ₹"+p.price+"/hr</p>" +
    "<p>📞 "+p.phone+"</p>" +
    "<p>🧰 "+p.exp+"</p>" +

    "</div>";
});

</script>

</body>
</html>
