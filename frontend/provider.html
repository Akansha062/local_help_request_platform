<!DOCTYPE html>
<html>
<head>
<title>Provider Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial;
  background: linear-gradient(to right, #eef2f3, #dfe9f3);
  padding:20px;
}

/* CARD */
.card{
  background:white;
  padding:25px;
  border-radius:15px;
  max-width:380px;
  margin:auto;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

/* PROFILE IMAGE */
.profile-img{
  width:100px;
  height:100px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:10px;
  border:3px solid #f4c430;
}

h2{
  margin:10px 0;
}

/* INFO BOX */
.info{
  background:#f9f9f9;
  padding:10px;
  border-radius:8px;
  margin:8px 0;
}

/* BUTTON */
button{
  margin-top:15px;
  padding:12px;
  width:100%;
  background:#f4c430;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
  transition:0.3s;
}

button:hover{
  background:#e0b020;
}

/* NOT FOUND */
.notfound{
  text-align:center;
  font-size:20px;
  color:red;
}
</style>
</head>

<body>

<div class="card" id="profile"></div>

<script>

// DATA (image added)
var providers = [
  {id:1, name:"Ravi Kumar", rating:4.5, price:300, phone:"9876543210", exp:"5 years", img:"https://i.pravatar.cc/100?img=1"},
  {id:2, name:"Aman Singh", rating:4.2, price:250, phone:"9123456780", exp:"3 years", img:"https://i.pravatar.cc/100?img=2"},
  {id:3, name:"Suresh", rating:4.6, price:350, phone:"9999999999", exp:"6 years", img:"https://i.pravatar.cc/100?img=3"}
];

// GET ID FROM URL
var params = new URLSearchParams(window.location.search);
var id = params.get("id");

// FIND PROVIDER
var person = providers.find(function(p){
  return p.id == id;
});

// SHOW DETAILS
if(person){
  document.getElementById("profile").innerHTML =
    "<img src='" + person.img + "' class='profile-img'>" +
    "<h2>" + person.name + "</h2>" +
    "<div class='info'> Rating: " + person.rating + "</div>" +
    "<div class='info'> Price: ₹" + person.price + "/hr</div>" +
    "<div class='info'>Phone: " + person.phone + "</div>" +
    "<div class='info'>Experience: " + person.exp + "</div>" +
    "<button onclick='book()'>Book Now</button>";
}
else{
  document.getElementById("profile").innerHTML =
    "<div class='notfound'> Provider Not Found</div>";
}

// BUTTON
function book(){
  alert("Booking Confirmed!");
}

</script>

</body>
</html>
